<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASSER TIERLIST | Official 1.21 Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        /* VOLLER FARB-CODE FÜR DAS WASSER-DESIGN */
        :root {
            --bg: #050608;
            --card: #0b0c12;
            --header: #0f111a;
            --primary: #00a2ff;
            --accent: #ffaa00;
            --text: #ffffff;
            --sub: #5d616d;
            /* TIER FARBEN */
            --ht1: #E8BA3A; --lt1: #D5B355;
            --ht2: #C4D3E7; --lt2: #A0A7B2;
            --ht3: #F89F5A; --lt3: #C67B42;
            --ht4: #81749A; --lt4: #655B79;
            --ht5: #8F82A8; --lt5: #3a3d4d;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -10%, rgba(0,162,255,0.15) 0%, var(--bg) 70%);
        }

        /* ANIMATIONEN */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER SECTION */
        .top-nav {
            padding: 80px 20px;
            text-align: center;
            animation: slideIn 0.8s ease;
        }

        .logo-main {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -4px;
            margin: 0;
            background: linear-gradient(180deg, #ffffff 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0,162,255,0.4));
        }

        .status-tag {
            font-family: 'JetBrains Mono';
            font-size: 0.8rem;
            color: var(--primary);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 700;
        }

        /* TABLE DESIGN */
        .wrapper {
            max-width: 1400px;
            margin: -20px auto 100px;
            padding: 0 20px;
            animation: slideIn 1s ease;
        }

        .main-container {
            background: var(--card);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.03);
            overflow: hidden;
            box-shadow: 0 60px 120px rgba(0,0,0,0.9);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: var(--header);
            padding: 30px;
            font-size: 0.75rem;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            border-bottom: 1px solid #000;
        }

        td {
            padding: 22px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.015);
        }

        tr:hover td {
            background: rgba(255,255,255,0.01);
        }

        /* PLAYER STYLES */
        .pos-num {
            font-family: 'JetBrains Mono';
            font-size: 1.5rem;
            font-weight: 800;
            color: #161821;
            font-style: italic;
        }

        .player-box {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .mc-head {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            image-rendering: pixelated;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .name-stack {
            display: flex;
            flex-direction: column;
        }

        .p-name {
            font-weight: 900;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .god-badge {
            font-size: 0.6rem;
            background: var(--primary);
            color: #000;
            padding: 3px 8px
